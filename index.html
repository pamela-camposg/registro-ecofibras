<!-- Consola Ecofibras · vista planilla inteligente -->
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
:root{
  --lime:#c4f135;--lime-dk:#a9d61f;--dark:#1c2e23;--muted:#6c7670;--faint:#9aa49c;
  --line:#d1d6cf;--line2:#e0e5dd;--bg:#eef1ec;--card:#fff;
  --green:#2f9e5b;--green-d:#228248;--green-soft:#e6f5ed;
  --amber:#d97a08;--amber-soft:#fff4dd;--red:#c0392b;--red-s:#fcecea;
  --blue:#1a4a7a;--blue-s:#e6f0f8;
  --hdr-bg:#2d4a3a;--hdr-fg:#fff;--hdr-bd:#1f3528;
  --entry-inp:#fffcec;--entry-auto:#e8f1f8;
  --row-odd:#fff;--row-even:#f7faf6;--row-hover:#edf4ea;
  --warn-bg:#fff8e1;--warn-bd:#e8c870;--warn-fg:#7c5c00;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--bg);color:var(--dark);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px}
body.hide-extra .col-extra{display:none!important}

.topbar{background:var(--lime);padding:13px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.wm{font-weight:800;font-size:23px;letter-spacing:-.03em;color:#16201a}.wm sup{font-size:10px;top:-10px}
.vline{width:1px;height:26px;background:rgba(0,0,0,.22)}
.bt1{font-size:12.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#16201a}
.bt2{font-size:10.5px;font-weight:600;letter-spacing:.05em;color:#3c4a3e}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#syncStat{font-size:11px;font-weight:700;color:#2f4538;background:rgba(0,0,0,.12);padding:5px 11px;border-radius:20px}

.ctrls{display:flex;align-items:center;gap:9px;padding:11px 20px;background:var(--card);border-bottom:1px solid var(--line2);position:sticky;top:54px;z-index:90;flex-wrap:wrap}
.mode-seg{display:inline-flex;background:#e3e7e0;border-radius:9px;padding:3px;gap:2px}
.mode-seg button{border:none;background:none;font-family:inherit;font-weight:700;font-size:12.5px;color:var(--muted);padding:8px 16px;border-radius:7px;cursor:pointer;transition:.15s;letter-spacing:.03em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.mode-seg button.on[data-m="ingreso"]{background:var(--card);color:var(--green);box-shadow:var(--shadow)}
.mode-seg button.on[data-m="salida"]{background:var(--card);color:var(--amber);box-shadow:var(--shadow)}
.ctrl-sep{width:1px;height:22px;background:var(--line2)}
.btn{border:none;font-family:inherit;font-weight:700;font-size:12.5px;padding:9px 15px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;letter-spacing:.02em;transition:.14s}
.btn-new,.btn-tool{background:var(--card);color:var(--muted);border:1.5px solid var(--line2)}.btn-new:hover,.btn-tool:hover{color:var(--dark);border-color:var(--muted)}
.btn-tool.on{background:var(--green-soft);color:var(--green-d);border-color:#bfe2cd}
.btn-exp{background:var(--lime);color:#16201a;border:none}.btn-exp:hover{background:var(--lime-dk)}.btn-exp:disabled{background:#e3e7e0;color:var(--faint);cursor:not-allowed}
.ctrls-right{margin-left:auto;display:flex;align-items:center;gap:9px}
.rec-count{font-family:'JetBrains Mono';font-size:11.5px;color:var(--green);background:var(--green-soft);padding:4px 10px;border-radius:20px;font-weight:700}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px 20px;background:#f7faf6;border-bottom:1px solid var(--line2)}
.kpi{background:var(--card);border:1px solid var(--line2);border-radius:11px;padding:11px 14px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green)}
.kpi.k-orange::before{background:var(--amber)}.kpi.k-blue::before{background:var(--blue)}.kpi.k-purple::before{background:#8b5cf6}
.k-l{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
.k-v{font-family:'JetBrains Mono';font-size:22px;font-weight:800;color:var(--green);margin-top:2px;line-height:1.1}
.k-v.text{font-size:13px;color:var(--dark);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-v.text small{font-family:'JetBrains Mono';color:var(--faint);font-weight:600;margin-left:4px;font-size:11px}
.kpi.k-orange .k-v{color:var(--amber)}.kpi.k-blue .k-v{color:var(--blue)}.kpi.k-purple .k-v{color:#7a3fdb}
@media(max-width:680px){.kpis{grid-template-columns:repeat(2,1fr)}}

/* Sugerencias */
.suggs{display:none;align-items:center;gap:10px;padding:9px 20px;background:var(--warn-bg);border-bottom:1px solid var(--warn-bd);flex-wrap:wrap}
.suggs.show{display:flex}
.s-l{font-size:10px;font-weight:800;color:var(--warn-fg);text-transform:uppercase;letter-spacing:.08em}
.s-list{display:flex;gap:6px;flex-wrap:wrap}
.s-chip{background:var(--card);border:1.5px solid var(--warn-bd);color:var(--warn-fg);font-family:inherit;font-weight:700;font-size:11.5px;padding:5px 11px;border-radius:14px;cursor:pointer;display:flex;gap:5px;align-items:center;transition:.14s}
.s-chip small{color:#9c7c2e;font-weight:600}
.s-chip:hover{background:#fffaeb;border-color:#c8a83a;transform:translateY(-1px)}

/* tabla */
.tbl-wrap{overflow-x:auto;position:relative}
.xlt{border-collapse:collapse;width:max-content;min-width:100%;font-size:12.5px}
.xlt thead th{background:var(--hdr-bg);color:var(--hdr-fg);padding:8px 9px;font-weight:700;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;border:1px solid var(--hdr-bd);position:sticky;top:0;user-select:none}
.xlt thead th.th-req::after{content:" *";color:var(--lime);font-size:11px}
.col-pin{position:sticky;left:0;z-index:10}
.xlt thead th.col-pin{z-index:20;background:var(--hdr-bg)}
tr.entry td{background:var(--entry-inp);border:1px solid var(--line);height:36px;padding:0}
tr.entry td.c-auto{background:var(--entry-auto);color:var(--blue);font-family:'JetBrains Mono';font-weight:700;font-size:12px;padding:0 8px;cursor:default;vertical-align:middle}
tr.entry td.col-pin{background:var(--entry-inp);position:sticky;left:0;z-index:5}
tr.entry td.c-err{border:2px solid var(--red)!important;background:var(--red-s)}
.cell-inp{width:100%;height:100%;border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:12.5px;color:var(--dark);padding:0 8px;outline:none}
.cell-inp:focus{background:rgba(47,158,91,.08)}
.cell-inp.mono{font-family:'JetBrains Mono';font-weight:600}
.cell-inp.upper{text-transform:uppercase}
.save-cell{display:flex;align-items:center;justify-content:center;height:36px}
#saveBtn{width:30px;height:30px;border-radius:50%;border:none;background:var(--green);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.16s;font-weight:700;box-shadow:0 2px 6px rgba(47,158,91,.4)}
#saveBtn:hover:not(:disabled){background:var(--green-d);transform:scale(1.1)}
#saveBtn:disabled{background:#d2d6cf;cursor:not-allowed;box-shadow:none}
tr.rec:nth-child(odd) td{background:var(--row-odd)}
tr.rec:nth-child(even) td{background:var(--row-even)}
tr.rec:hover td{background:var(--row-hover)}
tr.rec td{border:1px solid var(--line2);padding:5px 9px;height:32px;font-family:'JetBrains Mono';font-size:11.5px;white-space:nowrap;color:#3a4138;vertical-align:middle}
tr.rec td.c-del-cell{background:var(--row-odd)!important;border:none}
tr.rec:nth-child(even) td.c-del-cell{background:var(--row-even)!important}
tr.rec:hover td.c-del-cell{background:var(--row-hover)!important}
tr.rec td.col-pin{background:inherit;position:sticky;left:0;font-size:10.5px;color:var(--faint);font-family:'Plus Jakarta Sans';text-align:center;width:42px;border:none;box-shadow:2px 0 6px rgba(0,0,0,.06);font-weight:700}
tr.rec td.net{color:var(--green);font-weight:700}
.del{color:var(--faint);cursor:pointer;border:none;background:none;font-size:14px;padding:2px 6px;border-radius:5px}.del:hover{color:var(--red);background:var(--red-s)}
.empty-row td{text-align:center;color:var(--faint);padding:36px;font-family:'Plus Jakarta Sans';background:var(--row-odd)!important;border:1px solid var(--line2)}

/* warn bar */
.warn-bar{position:sticky;bottom:0;background:var(--warn-bg);border-top:1.5px solid var(--warn-bd);padding:8px 20px;font-size:12px;font-weight:700;color:var(--warn-fg);display:none;flex-direction:column;gap:3px;z-index:50;backdrop-filter:blur(4px)}
.warn-bar.show{display:flex}
.w-row{display:flex;gap:7px;align-items:center}
.w-err{color:var(--red)}
.w-dup{color:#9c4400}

/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal.show{display:flex}
.modal-c{background:var(--card);width:100%;max-width:680px;max-height:80vh;border-radius:14px;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.35);overflow:hidden}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line2);font-weight:800;font-size:14px;color:var(--dark)}
.m-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}.m-x:hover{color:var(--red)}
.modal-b{overflow-y:auto;padding:0}
.h-row{padding:10px 20px;border-bottom:1px solid var(--line2);display:flex;gap:12px;align-items:center;font-size:12px}
.h-row:last-child{border-bottom:none}
.h-act{font-size:9.5px;font-weight:800;text-transform:uppercase;padding:3px 8px;border-radius:5px;letter-spacing:.05em;min-width:65px;text-align:center}
.h-eliminado{background:var(--red-s);color:var(--red)}
.h-agregado{background:var(--green-soft);color:var(--green-d)}
.h-time{color:var(--muted);font-family:'JetBrains Mono';font-size:11px;min-width:130px}
.h-rec{font-family:'JetBrains Mono';color:#41493f;font-size:11.5px;flex:1;overflow:hidden;text-overflow:ellipsis}
.h-empty{text-align:center;color:var(--faint);padding:40px;font-family:'Plus Jakarta Sans'}

.toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(90px);background:var(--green);color:#fff;padding:13px 22px;border-radius:11px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.2);opacity:0;transition:.3s cubic-bezier(.2,.9,.3,1.3);z-index:200;display:flex;gap:8px;align-items:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.xlt thead th.grp{font-size:10px;letter-spacing:.12em;padding:6px 9px;background:#243a2d;border-bottom:2px solid var(--hdr-bd);color:#cfe6d8}
.xlt thead th.grp-material{background:#2f4a3e;color:#d4ece0}
.xlt thead th.grp-extra{background:#454e48;color:#dde2dd}
.grp-edge{border-left:2px solid #aeb6ac!important}
.xlt thead th.grp-edge{border-left:2px solid #16261c!important}
tr.entry td.grp-edge{border-left:2px solid #c7bd78!important}
tr.entry td.col-pin{border-left:3px solid var(--green)}
</style>

  <span class="wm">ambipar<sup>&reg;</sup></span><span class="vline"></span>
  <div><div class="bt1">Registro de Ingresos y Salidas</div><div class="bt2">Ecofibras &middot; San Joaquín</div></div>

</div>

</div>

<div class="suggs" id="suggs"><span class="s-l">💡 Sugerencias para este cliente:</span><div class="s-list" id="sList"></div></div>

<div class="tbl-wrap">

</div>
<div class="warn-bar" id="warnBar"></div>

<div class="modal" id="histModal">

    <div class="modal-h"><span>🕒 Historial de cambios</span><button class="m-x" id="histX">✕</button></div>
    <div class="modal-b" id="histBody"></div>
  </div>
</div>

function esc(s){return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function fmt(v){const n=Number(v);return isNaN(n)?(v||'—'):n.toLocaleString('es-CL',{maximumFractionDigits:3});}

(async function init(){
  fillList('dl_cliente',Object.keys(CONFIG.clientes));fillList('dl_destinatario',Object.keys(CONFIG.destinatarios));
  fillList('dl_transportista',Object.keys(CONFIG.transporte));fillList('dl_generador',CONFIG.generadores);
  fillList('dl_tipo',Object.keys(CONFIG.tipo_to_material));
  document.querySelectorAll('#modesel button').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.m)));
  try{const a=await window.storage.get('eco_ingreso');if(a&&a.value)store.ingreso=JSON.parse(a.value);}catch(e){}
  try{const b=await window.storage.get('eco_salida');if(b&&b.value)store.salida=JSON.parse(b.value);}catch(e){}
  try{const l=await window.storage.get('eco_learn');if(l&&l.value)learn=Object.assign({p2c:{},c2t:{},ranges:{}},JSON.parse(l.value));}catch(e){}
  try{const h=await window.storage.get('eco_audit');if(h&&h.value)audit=JSON.parse(h.value);}catch(e){}
  document.body.classList.add('hide-extra');
  setMode('ingreso');
  $('newBtn').addEventListener('click',clearAll);
  $('expBtn').addEventListener('click',exportData);
  $('extraBtn').addEventListener('click',toggleExtra);
  $('histBtn').addEventListener('click',showHist);
  $('histX').addEventListener('click',()=>$('histModal').classList.remove('show'));
  $('histModal').addEventListener('click',e=>{if(e.target===$('histModal'))$('histModal').classList.remove('show');});
  flushPending();
})();
async function persist(){try{await window.storage.set('eco_'+mode,JSON.stringify(recs()));}catch(e){}}
async function saveLearn(){try{await window.storage.set('eco_learn',JSON.stringify(learn));}catch(e){}}
async function saveAudit(){try{await window.storage.set('eco_audit',JSON.stringify(audit.slice(0,300)));}catch(e){}}

function setMode(m){
  mode=m;cols=(m==='ingreso'?ICOLS:SCOLS);pesoAuto=true;
  document.querySelectorAll('#modesel button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  buildTable(cols);fillEntrySelects(cols);
  const fe=$('e_fecha');if(fe)fe.value=new Date().toISOString().slice(0,10);updMes();
  renderRecs();updSync();updKpis();
}
function toggleExtra(){showExtra=!showExtra;document.body.classList.toggle('hide-extra',!showExtra);$('extraBtn').textContent=showExtra?'− Ocultar facturación':'+ Facturación';$('extraBtn').classList.toggle('on',showExtra);
  const w=document.querySelector('.tbl-wrap');if(w){if(showExtra)setTimeout(()=>w.scrollTo({left:w.scrollWidth,behavior:'smooth'}),60);else w.scrollTo({left:0,behavior:'smooth'});}}

let gstartSet=new Set();
function grpOf(c){return c.extra?'extra':(c.line?'material':'entrega');}
function grpLabel(g){if(g==='material')return 'Material y peso';if(g==='extra')return 'Facturación';return mode==='ingreso'?'Datos de la entrega':'Datos de la salida';}
function buildTable(cols){
  // agrupar columnas contiguas
  const groups=[];cols.forEach(c=>{const g=grpOf(c);const last=groups[groups.length-1];if(last&&last.g===g){last.span++;last.extra=last.extra&&!!c.extra;}else groups.push({g,span:1,extra:!!c.extra});});
  gstartSet=new Set();let acc=0;groups.forEach((gr,j)=>{if(j>0)gstartSet.add(acc);acc+=gr.span;});
  // fila 1: grupos
  let r1='<tr><th class="col-pin" rowspan="2" style="width:42px;min-width:42px"></th>';
  groups.forEach((gr,gi)=>{r1+=`<th colspan="${gr.span}" class="grp grp-${gr.g}${gr.extra?' col-extra':''}${gi>0?' grp-edge':''}">${grpLabel(gr.g)}</th>`;});
  r1+='<th rowspan="2" style="width:36px"></th></tr>';
  // fila 2: nombres de columna
  let r2='<tr>'+cols.map((c,i)=>{
    const cl=[];if(c.req)cl.push('th-req');if(c.extra)cl.push('col-extra');if(gstartSet.has(i))cl.push('grp-edge');
    return `<th${cl.length?' class="'+cl.join(' ')+'"':''} style="min-width:${c.w}px;width:${c.w}px">${c.l}</th>`;
  }).join('')+'</tr>';
  $('thead').innerHTML=r1+r2;
  // fila de ingreso
  let cells='<td class="col-pin"><div class="save-cell"><button id="saveBtn" disabled title="Guardar línea (Enter)">✓</button></div></td>';
  cols.forEach((c,i)=>{
    const extra=c.extra?' col-extra':'';const edge=gstartSet.has(i)?' grp-edge':'';
    if(c.t==='auto'){cells+=`<td id="ev_${c.k}" class="c-auto${extra}${edge}" style="min-width:${c.w}px"></td>`;}
    else{
      const cls='cell-inp'+(c.t==='num'?' mono':'')+(c.upper?' upper':'');
      let inp='';
      if(c.t==='date')inp=`<input id="e_${c.k}" type="date" class="${cls}">`;
      else if(c.t==='sel')inp=`<select id="e_${c.k}" class="${cls}"><option value="">—</option></select>`;
      else if(c.t==='dl')inp=`<input id="e_${c.k}" list="${c.dl}" class="${cls}" autocomplete="off" placeholder="…">`;
      else inp=`<input id="e_${c.k}" class="${cls}" autocomplete="off">`;
      cells+=`<td id="td_${c.k}" class="${(extra+edge).trim()}" style="min-width:${c.w}px">${inp}</td>`;
    }
  });
  cells+='<td></td>';
  const tr=document.createElement('tr');tr.className='entry';tr.innerHTML=cells;
  $('entryBody').innerHTML='';$('entryBody').appendChild(tr);
  attachListeners(cols);
}
function fillEntrySelects(cols){cols.forEach(c=>{if(c.t==='sel'){const el=$('e_'+c.k);if(el&&CONFIG[c.opts])fillSel(el,CONFIG[c.opts],'—');}});}
function attachListeners(cols){
  const inp=(k)=>$('e_'+k);
  const on=(k,fn)=>{const e=inp(k);if(e){e.addEventListener('input',fn);e.addEventListener('change',fn);}};
  on('fecha',()=>{updMes();validate();updKpis();});
  on('cliente',()=>{const r=CONFIG.clientes[eiv('cliente')];if(r&&r!=='0')setAuto('rutCli',r);showSuggs(eiv('cliente'));validate();});
  on('destinatario',()=>{const r=CONFIG.destinatarios[eiv('destinatario')];if(r&&r!=='0')setAuto('rutCli',r);showSuggs(eiv('destinatario'));validate();});
  on('transportista',()=>{const t=CONFIG.transporte[eiv('transportista')];if(t&&t.patente&&t.patente!=='0'&&!eiv('patente')){const pe=inp('patente');if(pe)pe.value=t.patente.toUpperCase();}validate();});
  on('patente',()=>{
    const p=(eiv('patente')||'').toUpperCase();
    const n=CONFIG.pat2tr[p];const te=inp('transportista');if(n&&te&&!te.value.trim())te.value=n;
    const d=learn.p2c[p];const ce=inp('conductor');if(d&&ce&&!ce.value.trim())ce.value=d;
    validate();
  });
  on('tipo',()=>{updTipo();autoPeso();validate();});
  on('volumen',()=>{autoPeso();validate();});
  on('kg',()=>{pesoAuto=false;updTon();validate();});
  cols.forEach(c=>{if(c.t==='sel'||c.t==='dl'||c.t==='txt'){const e=inp(c.k);if(e&&!['cliente','destinatario','transportista','patente','tipo'].includes(c.k))e.addEventListener('input',validate);}});
  const saveB=$('saveBtn');if(saveB)saveB.addEventListener('click',saveRow);
  // navegación con flechas ← → entre celdas (y Enter para guardar)
  const focusables=cols.filter(c=>c.t!=='auto').map(c=>'e_'+c.k);
  function moveFocus(curId,dir){
    const i=focusables.indexOf(curId);if(i<0)return;
    let j=i+dir;while(j>=0&&j<focusables.length){const el=$(focusables[j]);if(el&&el.offsetParent!==null){el.focus();if(el.select)try{el.select();}catch(_){}; return;}j+=dir;}
  }
  cols.filter(c=>c.t!=='auto').forEach(c=>{
    const el=inp(c.k);if(!el)return;
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'){if(saveB&&!saveB.disabled){e.preventDefault();saveRow();}return;}
      const atEnd=(el.selectionStart==null)||(el.selectionStart===(el.value||'').length&&el.selectionEnd===(el.value||'').length);
      const atStart=(el.selectionStart==null)||(el.selectionStart===0&&el.selectionEnd===0);
      const isSel=(el.tagName==='SELECT'||el.type==='date');
      if(e.key==='ArrowRight'&&(isSel||atEnd)){e.preventDefault();moveFocus('e_'+c.k,1);}
      else if(e.key==='ArrowLeft'&&(isSel||atStart)){e.preventDefault();moveFocus('e_'+c.k,-1);}
    });
  });
}
const eiv=k=>{const e=$('e_'+k);return e?(e.value||'').trim():'';};
const setAuto=(k,v)=>{const e=$('ev_'+k);if(e)e.textContent=(v==null?'':String(v));};
const getAuto=k=>{const e=$('ev_'+k);return e?e.textContent.trim():'';};
function updMes(){const v=eiv('fecha');setAuto('mes',v?MESES[parseInt(v.slice(5,7),10)-1]:'');}
function updTipo(){
  const t=eiv('tipo'),mat=CONFIG.tipo_to_material[t]||'',fam=mat?CONFIG.material_to_familia[mat]||'':'';
  setAuto('material',mat);setAuto('familia',fam);
  const d=CONFIG.tipo_dens[t];setAuto('_dens',d!=null?d:'');
}
function updTon(){const kg=num(eiv('kg'));setAuto('ton',isNaN(kg)?'':(kg/1000).toLocaleString('es-CL',{maximumFractionDigits:3}));}
function autoPeso(){
  const t=eiv('tipo'),d=CONFIG.tipo_dens[t],vol=num(eiv('volumen'));
  if(d!=null&&!isNaN(vol)&&pesoAuto){const kg=Math.round(vol*d);const ke=$('e_kg');if(ke){ke.value=String(kg);}}
  updTon();
}

/* CHEQUEOS INTELIGENTES */
function dupCheck(){
  const f=eiv('fecha'),c=mode==='ingreso'?eiv('cliente'):eiv('destinatario'),m=getAuto('material'),kgN=num(eiv('kg'));
  if(!f||!c||!m||isNaN(kgN))return '';
  const dup=recs().find(r=>r.fecha===f&&((r.cliente||r.destinatario)===c)&&r.material===m&&Number(r.kg)===kgN);
  return dup?`⚠ Posible duplicado: hoy ya hay un ${m} de ${c} con ${kgN.toLocaleString('es-CL')} kg`:'';
}
function sanityCheck(){
  const t=eiv('tipo'),vol=num(eiv('volumen')),kg=num(eiv('kg')),d=CONFIG.tipo_dens[t];
  if(!t||isNaN(kg))return '';
  if(d!=null&&!isNaN(vol)&&vol>0){
    const exp=vol*d,delta=Math.abs(kg-exp)/exp;
    if(delta>0.30)return `⚠ Peso muy distinto al esperado · vol × densidad ≈ ${Math.round(exp).toLocaleString('es-CL')} kg`;
  }
  const r=learn.ranges[t];
  if(r&&r.n>=3){
    const avg=r.sum/r.n;
    if(kg<avg*0.4||kg>avg*2.5)return `⚠ Peso fuera del rango histórico de "${t}" · promedio ≈ ${Math.round(avg).toLocaleString('es-CL')} kg (n=${r.n})`;
  }
  return '';
}
function validate(){
  let errs=[];
  cols.filter(c=>c.req&&c.t!=='auto').forEach(c=>{
    const v=eiv(c.k),td=$('td_'+c.k);
    if(!v){if(td)td.classList.add('c-err');errs.push(c.l);}
    else if(td)td.classList.remove('c-err');
  });
  const ok=errs.length===0;
  const sb=$('saveBtn');if(sb)sb.disabled=!ok;
  const wb=$('warnBar');if(wb){
    const lines=[];
    if(errs.length)lines.push(`<div class="w-row w-err">✗ Falta: ${errs.join(', ')}</div>`);
    const dW=dupCheck();if(dW)lines.push(`<div class="w-row w-dup">${dW}</div>`);
    const sW=sanityCheck();if(sW)lines.push(`<div class="w-row">${sW}</div>`);
    wb.innerHTML=lines.join('');wb.classList.toggle('show',lines.length>0);
  }
  return ok;
}

/* SUGERENCIAS */
function showSuggs(client){
  const box=$('suggs'),list=$('sList');
  if(!client){box.classList.remove('show');return;}
  const map=learn.c2t[client];
  if(!map){box.classList.remove('show');return;}
  const top=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(!top.length){box.classList.remove('show');return;}
  list.innerHTML=top.map(([t,n])=>`<button class="s-chip" data-t="${t.replace(/"/g,'&quot;')}">${esc(t)} <small>${n}×</small></button>`).join('');
  list.querySelectorAll('.s-chip').forEach(b=>b.addEventListener('click',()=>{const e=$('e_tipo');if(e){e.value=b.dataset.t;updTipo();autoPeso();validate();e.focus();}}));
  box.classList.add('show');
}

/* APRENDIZAJE */
function recordLearn(rec){
  if(rec.patente&&rec.conductor)learn.p2c[rec.patente]=rec.conductor;
  const cK=rec.cliente||rec.destinatario;
  if(cK&&rec.tipo){if(!learn.c2t[cK])learn.c2t[cK]={};learn.c2t[cK][rec.tipo]=(learn.c2t[cK][rec.tipo]||0)+1;}
  const kg=Number(rec.kg);
  if(rec.tipo&&!isNaN(kg)&&kg>0){
    const r=learn.ranges[rec.tipo]||{min:kg,max:kg,sum:0,n:0};
    r.min=Math.min(r.min,kg);r.max=Math.max(r.max,kg);r.sum+=kg;r.n++;
    learn.ranges[rec.tipo]=r;
  }
  saveLearn();
}

function collectRow(){
  const rec={mode,hora:new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}),_sent:false};
  cols.forEach(c=>{if(c.noSave)return;rec[c.k]=c.t==='auto'?getAuto(c.k):eiv(c.k);});
  return rec;
}
function clearLineFields(){
  cols.filter(c=>c.line).forEach(c=>{
    if(c.t==='auto'){setAuto(c.k,'');}
    else{const e=$('e_'+c.k);if(e)e.value='';}
  });
  pesoAuto=true;validate();
  const ft=$('e_tipo');if(ft)ft.focus();
}
function clearAll(){
  cols.forEach(c=>{
    if(c.t==='auto')setAuto(c.k,'');
    else{const e=$('e_'+c.k);if(e)e.value='';}
  });
  if($('e_fecha')){$('e_fecha').value=new Date().toISOString().slice(0,10);updMes();}
  $('suggs').classList.remove('show');pesoAuto=true;validate();
  const fc=$('e_cliente')||$('e_destinatario');if(fc)fc.focus();
}
function saveRow(){
  if(!validate())return;
  const rec=collectRow();
  recs().unshift(rec);persist();renderRecs();
  audit.unshift({action:'agregado',time:new Date().toISOString(),mode,rec:{fecha:rec.fecha,cliente:rec.cliente||rec.destinatario,material:rec.material,tipo:rec.tipo,kg:rec.kg}});saveAudit();
  recordLearn(rec);updKpis();
  toast('Guardado · '+(rec.tipo||rec.material));
  clearAll();sendRec(rec);
}

function renderRecs(){
  $('recCount').textContent=recs().length+' registro'+(recs().length!==1?'s':'');
  $('expBtn').disabled=recs().length===0;
  const tb=$('recBody');
  if(!recs().length){tb.innerHTML='<tr class="empty-row"><td colspan="'+(cols.length+2)+'">Llena la fila amarilla de arriba y pulsa ✓ (o Enter). Muévete entre celdas con Tab o las flechas ← →. Desliza → para ver más columnas.</td></tr>';return;}
  tb.innerHTML=recs().map((r,i)=>{
    const cells=cols.map((c,i)=>{
      const v=r[c.k];
      const isKgTon=(c.k==='ton'||c.k==='kg');
      const extra=c.extra?' col-extra':'';
      const edge=gstartSet.has(i)?' grp-edge':'';
      const cls=((isKgTon?'net':'')+extra+edge).trim();
      return `<td${cls?' class="'+cls+'"':''}>${isKgTon?fmt(v):(esc(v)||'—')}</td>`;
    }).join('');
    return `<tr class="rec"><td class="col-pin">${i+1}</td>${cells}<td class="c-del-cell"><button class="del" data-i="${i}">✕</button></td></tr>`;
  }).join('');
  tb.querySelectorAll('.del').forEach(b=>b.addEventListener('click',()=>{
    const idx=+b.dataset.i;const rec=recs()[idx];
    if(confirm('¿Eliminar este registro?')){
      audit.unshift({action:'eliminado',time:new Date().toISOString(),mode,rec:{fecha:rec.fecha,cliente:rec.cliente||rec.destinatario,material:rec.material,tipo:rec.tipo,kg:rec.kg}});saveAudit();
      recs().splice(idx,1);persist();renderRecs();updSync();updKpis();
    }
  }));
}

function updKpis(){
  const today=new Date().toISOString().slice(0,10);
  const tr=recs().filter(r=>r.fecha===today);
  $('kpiCount').textContent=tr.length;
  const totKg=tr.reduce((s,r)=>{const n=Number(r.kg);return isNaN(n)?s:s+n;},0);
  $('kpiTon').textContent=(totKg/1000).toLocaleString('es-CL',{maximumFractionDigits:2});
  const mCt={},cCt={};
  tr.forEach(r=>{if(r.material)mCt[r.material]=(mCt[r.material]||0)+1;const c=r.cliente||r.destinatario;if(c)cCt[c]=(cCt[c]||0)+1;});
  const tM=Object.entries(mCt).sort((a,b)=>b[1]-a[1])[0];
  const tC=Object.entries(cCt).sort((a,b)=>b[1]-a[1])[0];
  $('kpiMat').innerHTML=tM?(esc(tM[0])+' <small>'+tM[1]+'×</small>'):'—';
  $('kpiCli').innerHTML=tC?(esc(tC[0])+' <small>'+tC[1]+'×</small>'):'—';
}

function showHist(){
  const body=$('histBody');
  if(!audit.length){body.innerHTML='<div class="h-empty">Sin cambios registrados aún.</div>';}
  else{body.innerHTML=audit.slice(0,100).map(a=>`<div class="h-row"><span class="h-act h-${a.action}">${a.action}</span><span class="h-time">${new Date(a.time).toLocaleString('es-CL')}</span><span class="h-rec">${esc(a.rec.fecha||'')} · ${esc(a.rec.cliente||'')} · ${esc(a.rec.material||'')} · ${fmt(a.rec.kg)} kg <span style="color:var(--faint)">(${a.mode})</span></span></div>`).join('');}
  $('histModal').classList.add('show');
}

function exportData(){
  const e=mode==='ingreso'?EXP_INGRESO:EXP_SALIDA;
  const cell=v=>{v=(v==null?'':String(v));return /[;"\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[e.H.join(';')];recs().slice().reverse().forEach(r=>lines.push(e.K.map(k=>cell(r[k])).join(';')));
  const blob=new Blob(['\ufeff'+lines.join('\r\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(mode==='ingreso'?'ingresos':'salidas')+'_ecofibras_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

async function sendRec(rec){if(!CENTRAL_URL){updSync();return;}
  try{await fetch(CENTRAL_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(rec)});rec._sent=true;persist();}catch(e){rec._sent=false;}updSync();}
async function flushPending(){if(!CENTRAL_URL){updSync();return;}
  for(const m of ['ingreso','salida'])for(const r of store[m])if(!r._sent){try{await fetch(CENTRAL_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(r)});r._sent=true;}catch(e){}}
  try{await window.storage.set('eco_ingreso',JSON.stringify(store.ingreso));await window.storage.set('eco_salida',JSON.stringify(store.salida));}catch(e){}updSync();}
function updSync(){const el=$('syncStat');if(!el)return;
  if(!CENTRAL_URL){el.style.display='none';return;}
  el.style.display='';
  const pend=[...store.ingreso,...store.salida].filter(r=>r&&!r._sent).length;
  el.textContent=pend===0?'● Central al día':'⚠ '+pend+' sin enviar';}
setInterval(flushPending,20000);

let tt;function toast(m){$('toastMsg').textContent=m;$('toast').classList.add('show');clearTimeout(tt);tt=setTimeout(()=>$('toast').classList.remove('show'),2000);}
</script>
